<!DOCTYPE html>

<head>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:16px;
}

.container{
    max-width:1100px;
    margin:auto;

h1{
    text-align:center;
    color:#60a5fa;
    margin-bottom:24px;
    font-size:22px;

.card{
    background:#1e293b;
    padding:12px;
    border-radius:14px;
    margin-bottom:20px;

.card h2{

    font-size:22px;

.version{

select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;

}

textarea{
    width:100%;
    height:220px;
    background:#020617;
    color:white;
    border:none;
    border-radius:14px;
    padding:12px;
    resize:vertical;
    line-height:1.5;
    margin-top:15px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#2563eb;
}

.copy{
    background:#10b981;
}

.copy:hover{
    background:#059669;
}

.note{
    background:#172554;
    padding:12px;
    border-radius:14px;
    margin-bottom:20px;
    color:#cbd5e1;
    line-height:1.8;
}

.red{
    color:#f87171;
    font-weight:bold;
}


@media (min-width: 992px){
    .card{
        max-width:900px;
        margin-left:auto;
        margin-right:auto;
    }
    textarea{
        height:180px;
    }
}


.container{
    max-width:900px !important;
    width:100%;
    margin:0 auto;
}

body{
    max-width:100vw;
    overflow-x:hidden;
}

@media (min-width:1200px){
    .container{
        max-width:850px !important;
    }
}

</style>
</head>

<script>

function generateAvatar1(){

let hijab =
document.getElementById("avatarHijab").value;

document.getElementById("avatar1").value =
`Buat foto potret dari paha hingga kepala, seorang wanita ${hijab} seperti di foto referensi 
gambar, Subjek harus berdiri menghadap ke depan sepenuhnya dan tersenyum ramah ke 
arah kamera. Tinggi kamera sejajar sempurna dengan ketinggian mata subjek. Sisakan 
ruang kosong yang cukup di atas kepala dan di sekitar kedua sisi subjek untuk tampilan 
editorial yang bersih.

Pakaian yang dikenakan adalah kaos polos warna hitam lengan panjang ketat dan celana 
jeans.

Subjek berada di kamar latar belakang dinding putih bersih, shot on iPhone 13 pro, natural, 
hyper realistic, clean.

PENTING:
1. Aktifkan mode konsistensi wajah ketat (strict facial consistency mode).
2. Prioritaskan fitur wajah dari gambar referensi wajah yang diberikan.
3. Wajah harus 100% identik dengan foto referensi.
4. Pertahankan JIKA mengenakan jilbab.

Hasil harus terlihat seperti foto manusia asli, bukan ilustrasi AI, tanpa wajah plastik, tanpa 
beauty filter, Kulit putih porcelain.`;

}

function generateAvatar2(){

let hijab =
document.getElementById("avatarHijab").value;

document.getElementById("avatar2").value =
`Buat foto potret dari paha hingga kepala, seorang wanita ${hijab} seperti di foto referensi 
gambar, Subjek harus berdiri menghadap ke depan sepenuhnya dan tersenyum ramah ke 
arah kamera. Pakaian yang dikenakan adalah kaos ketat polos warna hitam lengan panjang 
dan celana jeans.

Hasil harus terlihat seperti foto manusia asli, bukan ilustrasi AI, tanpa wajah plastik, tanpa 
beauty filter, Kulit putih porcelain sangat halus.

Subjek berada di kamar latar belakang dinding putih bersih, shot on iphone 13 pro, natural, 
hyperrealistic, clean.`;

}

function generateBg1(){

let bg =
document.getElementById("backgroundSelect").value;

document.getElementById("bg1").value =
`Foto potret dalam ruangan ultra realistis dari wanita yang PERSIS SAMA dari gambar 
referensi, berdiri dalam posisi dan pose yang PERSIS SAMA, menghadap langsung ke 
kamera dengan ekspresi wajah yang PERSIS SAMA, postur tubuh yang PERSIS SAMA, 
proporsi yang PERSIS SAMA, bentuk dan lipatan hijab yang PERSIS SAMA, komposisi 
bingkai dan pemotongan yang PERSIS SAMA.

Identitas subjek harus tetap 100% identik dengan foto referensi asli. Pertahankan semua 
fitur wajah, warna kulit, struktur wajah, bentuk mata, hidung, bibir, senyum, penampilan usia,
dan karakteristik pribadi persis seperti pada gambar sumber. JANGAN mempercantik, 
menata gaya, atau mengubah orang tersebut.

Hanya ubah latar belakang menjadi ruangan dengan ${bg}

Sesuaikan warna kulit dan eksposur agar menyatu secara alami dengan lingkungan.`;

}

function generateBg2(){

let bg =
document.getElementById("backgroundSelect").value;

document.getElementById("bg2").value =
`Ubah lokasi menjadi di ruangan dengan Latar Belakang:

${bg}

Background sederhana dan sedikit blur sehingga fokus utama tetap pada subjek.

Pencahayaan:
Pencahayaan soft indoor lighting dengan sumber cahaya utama dari depan sedikit ke kiri 
wajah. Bayangan sangat lembut, tone warna netral-cool, dengan kualitas foto tajam dan 
aesthetic seperti hasil kamera smartphone iPhone 13 pro.

PASTIKAN:
- orang yang dihasilkan adalah ORANG YANG SAMA.
- wajah, identitas, dan karakter personal TIDAK BERUBAH.
- ekspresi wajah dan pose TETAP SAMA.
- framing kamera TETAP SAMA.`;

}

function generateCloth1(){

document.getElementById("cloth1").value =
`Buat gambar baru yang sangat realistis dan natural di mana model dari gambar pertama
memakai pakaian dari gambar kedua. Sesuaikan lipatan kain, pencahayaan, dan bayangan 
agar pas dengan postur tubuh model.

ATURAN PENTING:
1. Aktifkan mode konsistensi wajah ketat (strict facial consistency mode).
2. Pertahankan identitas subjek secara akurat dan presisi.
3. Rapikan atau sesuaikan jilbab agar terlihat natural dengan pakaian.
4. Boleh menyesuaikan pencahayaan agar menyatu dengan baik.
5. Hilangkan teks atau watermark.

Pastikan pakaian baru terlihat:
- mengikuti bentuk tubuh secara alami
- mempertahankan tekstur kain dan sifat material yang akurat
- mempertahankan jahitan, sambungan, lipatan, kerutan, dan ketebalan
- mempertahankan detail dan warna secara akurat
- mempertahankan proporsi pakaian yang realistis
- terlihat seperti dikenakan oleh subjek, bukan ditempel atau mengambang`;

}

function generateCloth2(){

document.getElementById("cloth2").value =
`Anda adalah AI ahli dalam Virtual Try-On pakaian. Saya memberikan dua gambar: gambar 
pertama adalah foto model (manusia), dan gambar kedua adalah produk pakaian.

Tugas: Buat gambar baru yang sangat realistis dan natural di mana model dari gambar 
pertama memakai pakaian dari gambar kedua. Sesuaikan lipatan kain, pencahayaan, dan 
bayangan agar pas dengan postur tubuh model, jangan merubah detail tubuh model.`;

}

function generateSwap(){

document.getElementById("swap").value =
`Ganti subjek pada gambar 1 dengan wanita dari gambar 2.

Pertahankan latar belakang asli, detail ruangan, warna dinding, objek, sudut kamera, 
pembingkaian, komposisi, dan pencahayaan PERSIS sama seperti pada Gambar 1.

Ganti hanya orangnya. Subjek baru harus:
– Sesuai dengan pose persis Gambar 1.
– Sesuai dengan perspektif dan jarak kamera yang sama.
– Beradaptasi secara alami dengan pencahayaan dalam ruangan Gambar 1.
– Sesuai dengan arah dan intensitas bayangan dari Gambar 1.
– Sesuaikan warna kulit dan eksposur agar menyatu secara alami dengan lingkungan 
Gambar 1.

JANGAN memodifikasi:
– Latar belakang.
– Pengaturan pencahayaan.
– Objek ruangan.
– Nada warna.
– Pembingkaian kamera.`;

}

function copyText(id){

let copy =
document.getElementById(id);

copy.select();

navigator.clipboard.writeText(copy.value);

alert("Prompt berhasil di copy!");

}

</script>
